<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Pelada Fácil</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>⚽ Pelada Fácil</h1>

<div class="entrada">
    <input type="text" id="nome" placeholder="Digite seu nome">
    <button onclick="entrarFila()">Entrar na fila</button>
</div>

<h2>Jogando Agora</h2>

<div class="times">
    <div>
        <h3>Time A</h3>
        <ul id="timeA"></ul>
    </div>

    <div>
        <h3>Time B</h3>
        <ul id="timeB"></ul>
    </div>
</div>

<h2>Fila</h2>
<ul id="fila"></ul>

<div class="acoes">
    <button onclick="timeVenceu('A')">Time A venceu</button>
    <button onclick="timeVenceu('B')">Time B venceu</button>
</div>

<script src="script.js"></script>

</body>
</html>
